name: ATM Bot - We Wealth Registrazione

on:
  workflow_dispatch:  # avvio manuale dal pulsante "Run workflow"

jobs:
  registra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: npm install playwright nodemailer googleapis

      - name: Installa Chromium
        run: npx playwright install chromium --with-deps

      - name: Esegui login.js
        env:
          WW_PASSWORD: ${{ secrets.WW_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          PLAYWRIGHT_HEADLESS: 'true'
        run: node login.js
